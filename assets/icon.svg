<svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="$RICH coin icon">
  <defs>
    <linearGradient id="goldG" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffe9a8"/><stop offset="1" stop-color="#c99b2e"/>
    </linearGradient>
    <linearGradient id="hoodG" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#17b06a"/><stop offset="1" stop-color="#076034"/>
    </linearGradient>
    <radialGradient id="skinG" cx=".5" cy=".4" r=".8">
      <stop offset="0" stop-color="#ffe3b3"/><stop offset="1" stop-color="#f2c17e"/>
    </radialGradient>
    <radialGradient id="bgG" cx=".5" cy=".35" r=".9">
      <stop offset="0" stop-color="#123723"/><stop offset="1" stop-color="#050f09"/>
    </radialGradient>
  </defs>

  <!-- luxe coin -->
  <circle cx="256" cy="256" r="246" fill="url(#goldG)"/>
  <circle cx="256" cy="256" r="222" fill="url(#bgG)" stroke="#8a6a1c" stroke-width="6"/>
  <circle cx="256" cy="256" r="204" fill="none" stroke="#d4af37" stroke-width="3" stroke-dasharray="4 10" opacity=".7"/>

  <!-- richie head, full drip -->
  <g transform="translate(256 288) scale(1.45) translate(-256 -190)">
    <!-- head -->
    <circle cx="256" cy="190" r="88" fill="url(#skinG)" stroke="#b8834a" stroke-width="8"/>
    <!-- hood -->
    <path d="M256 76 C 164 76 132 146 140 214 C 144 246 158 268 180 280 L 200 236 C 194 178 216 140 256 140 C 296 140 318 178 312 236 L 332 280 C 354 268 368 246 372 214 C 380 146 348 76 256 76 Z" fill="url(#hoodG)" stroke="#053622" stroke-width="10" stroke-linejoin="round"/>
    <path d="M203 230 C 199 180 220 146 256 146 C 292 146 313 180 309 230" fill="none" stroke="#d4af37" stroke-width="4" stroke-dasharray="7 7" opacity=".85"/>
    <!-- crown -->
    <g transform="rotate(-10 330 92)">
      <path d="M282 110 l 10 -40 l 24 24 l 20 -34 l 20 34 l 24 -24 l 10 40 Z" fill="url(#goldG)" stroke="#8a6a1c" stroke-width="6" stroke-linejoin="round"/>
      <rect x="280" y="106" width="112" height="16" rx="7" fill="url(#goldG)" stroke="#8a6a1c" stroke-width="5"/>
      <circle cx="316" cy="78" r="5" fill="#0fae62"/><circle cx="356" cy="78" r="5" fill="#ff5a6e"/>
    </g>
    <!-- shades -->
    <path d="M188 176 h 136" stroke="#d4af37" stroke-width="6"/>
    <rect x="192" y="170" width="52" height="34" rx="14" fill="#1a1206" stroke="#d4af37" stroke-width="5"/>
    <rect x="268" y="170" width="52" height="34" rx="14" fill="#1a1206" stroke="#d4af37" stroke-width="5"/>
    <path d="M202 180 q 10 -6 18 0" stroke="rgba(255,233,168,.7)" stroke-width="4" fill="none" stroke-linecap="round"/>
    <path d="M278 180 q 10 -6 18 0" stroke="rgba(255,233,168,.7)" stroke-width="4" fill="none" stroke-linecap="round"/>
    <!-- cheeks / nose / smirk / tooth -->
    <ellipse cx="192" cy="218" rx="15" ry="9" fill="#ff9d7a" opacity=".55"/>
    <ellipse cx="320" cy="218" rx="15" ry="9" fill="#ff9d7a" opacity=".55"/>
    <ellipse cx="256" cy="212" rx="13" ry="10" fill="#f2b06e" stroke="#b8834a" stroke-width="5"/>
    <path d="M216 238 q 36 26 82 4" fill="none" stroke="#4a2c12" stroke-width="9" stroke-linecap="round"/>
    <path d="M284 244 l 7 13 l 11 -9 Z" fill="url(#goldG)" stroke="#8a6a1c" stroke-width="3" stroke-linejoin="round"/>
  </g>

  <!-- sparkles -->
  <g fill="#ffe9a8">
    <path d="M104 140 l 6 15 l 15 6 l -15 6 l -6 15 l -6 -15 l -15 -6 l 15 -6 Z"/>
    <path d="M406 132 l 5 12 l 12 5 l -12 5 l -5 12 l -5 -12 l -12 -5 l 12 -5 Z"/>
  </g>
</svg>
