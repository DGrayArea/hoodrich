<svg viewBox="0 0 1500 500" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="HOODRICH banner — new money, same hood">
  <defs>
    <radialGradient id="bgG" cx=".5" cy="0" r="1.15">
      <stop offset="0" stop-color="#123723"/><stop offset=".55" stop-color="#0a1c11"/><stop offset="1" stop-color="#050f09"/>
    </radialGradient>
    <radialGradient id="glowG" cx=".5" cy=".5" r=".5">
      <stop offset="0" stop-color="#d4af37" stop-opacity=".28"/><stop offset="1" stop-color="#d4af37" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="goldG" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffe9a8"/><stop offset="1" stop-color="#c99b2e"/>
    </linearGradient>
    <linearGradient id="goldTxt" x1="0" y1="0" x2="0" y2="1">
      <stop offset=".08" stop-color="#ffe9a8"/><stop offset=".46" stop-color="#d4af37"/><stop offset=".82" stop-color="#8a6a1c"/><stop offset="1" stop-color="#ffe9a8"/>
    </linearGradient>
    <linearGradient id="hoodG" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#17b06a"/><stop offset="1" stop-color="#076034"/>
    </linearGradient>
    <radialGradient id="skinG" cx=".5" cy=".4" r=".8">
      <stop offset="0" stop-color="#ffe3b3"/><stop offset="1" stop-color="#f2c17e"/>
    </radialGradient>
  </defs>

  <rect width="1500" height="500" fill="url(#bgG)"/>
  <!-- thin gold frame -->
  <rect x="18" y="18" width="1464" height="464" rx="18" fill="none" stroke="#d4af37" stroke-width="2" opacity=".55"/>
  <rect x="26" y="26" width="1448" height="448" rx="14" fill="none" stroke="#d4af37" stroke-width="1" stroke-dasharray="3 9" opacity=".4"/>

  <!-- wordmark left-center -->
  <text x="120" y="120" font-family="Georgia,serif" font-size="22" letter-spacing="8" fill="#d4af37">EST. 2026 · ROBINHOOD CHAIN · MEMBERS PREFERRED</text>
  <text x="112" y="248" font-family="Georgia,'Times New Roman',serif" font-weight="700" font-size="128" letter-spacing="3" fill="url(#goldTxt)">HOODRICH</text>
  <text x="118" y="318" font-family="Georgia,serif" font-style="italic" font-weight="700" font-size="46" fill="#0fae62">$RICH</text>
  <text x="118" y="378" font-family="Georgia,serif" font-style="italic" font-size="38" fill="#f6efe0">"New money. Same hood."</text>
  <text x="120" y="428" font-family="Georgia,serif" font-size="23" fill="#a7cbb4">The first luxury asset of the trenches — fair launch on hood.fun</text>

  <!-- falling bills -->
  <g opacity=".85">
    <g transform="rotate(-14 700 80)"><rect x="672" y="66" width="56" height="28" rx="4" fill="#0fae62" stroke="#076034" stroke-width="3"/><text x="700" y="86" text-anchor="middle" font-family="Georgia" font-size="15" font-weight="700" fill="#eafff2">$</text></g>
    <g transform="rotate(18 950 420)"><rect x="922" y="406" width="48" height="24" rx="4" fill="#0fae62" stroke="#076034" stroke-width="3"/><text x="946" y="424" text-anchor="middle" font-family="Georgia" font-size="13" font-weight="700" fill="#eafff2">$</text></g>
    <g transform="rotate(-8 620 440)"><rect x="596" y="428" width="42" height="21" rx="3" fill="#0fae62" stroke="#076034" stroke-width="2.5"/><text x="617" y="444" text-anchor="middle" font-family="Georgia" font-size="12" font-weight="700" fill="#eafff2">$</text></g>
  </g>
  <!-- sparkles -->
  <g fill="#ffe9a8">
