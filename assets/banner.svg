    <path d="M194 280 C 220 322 292 322 318 280" fill="none" stroke="#d4af37" stroke-width="13" stroke-linecap="round" stroke-dasharray="3 12"/>
    <circle cx="256" cy="336" r="27" fill="url(#goldG)" stroke="#8a6a1c" stroke-width="6"/>
    <text x="256" y="349" text-anchor="middle" font-family="Georgia,serif" font-style="italic" font-weight="700" font-size="34" fill="#8a6a1c">R</text>
